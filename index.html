<script>

    measurementId: "G-JHXL2NF6F1"

  firebase.initializeApp(firebaseConfig);

  const COAT_COLORS = ['черный', 'белый', 'рыжий', 'серый'];
  const EYE_COLORS = ['голубой', 'зеленый', 'желтый'];
  const PATTERNS = ['однотонный', 'полосатый', 'крапчатый', 'поинт'];
  const CHARACTERS = ['добрый', 'игривый', 'агрессивный', 'ласковый', 'дружелюбный', 'ленивый'];
  const FEMALE_NAMES = ['Дымка', 'Снежка', 'Люся', 'Мила', 'Пуша', 'Луна', 'Зайка'];
  const MALE_NAMES = ['Персик', 'Рыжик', 'Барсик', 'Уголёк', 'Кузя', 'Симба'];
  const HOME_SIZES = { 'маленький': 7, 'небольшой': 10, 'средний': 15, 'большой': 20, 'огромный': 30 };
  const HOME_PRICES = { 'небольшой': 100, 'средний': 250, 'большой': 500, 'огромный': 1000 };

  function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  const coatChances = {
    "черный x черный": { черный: 0.8, серый: 0.2 },
    "белый x белый": { белый: 0.9, серый: 0.1 },
    "рыжий x рыжий": { рыжий: 0.9, черный: 0.1 },
    "серый x серый": { серый: 0.7, черный: 0.15, белый: 0.15 },
    "черный x белый": { черный: 0.3, белый: 0.7 },
    "белый x черный": { черный: 0.3, белый: 0.7 },
    "черный x рыжий": { черный: 0.6, рыжий: 0.4 },
    "рыжий x черный": { черный: 0.6, рыжий: 0.4 },
    "черный x серый": { черный: 0.5, серый: 0.5 },
    "серый x черный": { черный: 0.5, серый: 0.5 },
    "белый x рыжий": { белый: 0.4, рыжий: 0.6 },
    "рыжий x белый": { белый: 0.4, рыжий: 0.6 },
    "белый x серый": { белый: 0.5, серый: 0.5 },
    "серый x белый": { белый: 0.5, серый: 0.5 },
    "рыжий x серый": { рыжий: 0.5, серый: 0.5 },
    "серый x рыжий": { рыжий: 0.5, серый: 0.5 },
  };
  const eyeChances = {
    "голубой x голубой": { голубой: 0.9, зеленый: 0.1 },
    "зеленый x зеленый": { зеленый: 0.8, желтый: 0.2 },
    "желтый x желтый": { желтый: 0.9, зеленый: 0.1 },
    "голубой x зеленый": { голубой: 0.3, зеленый: 0.7 },
    "зеленый x голубой": { голубой: 0.3, зеленый: 0.7 },
    "голубой x желтый": { голубой: 0.4, желтый: 0.6 },
    "желтый x голубой": { голубой: 0.4, желтый: 0.6 },
    "зеленый x желтый": { зеленый: 0.6, желтый: 0.4 },
    "желтый x зеленый": { зеленый: 0.6, желтый: 0.4 },
  };

  function inheritCoat(c1, c2) {
    const key = `${c1} x ${c2}`;
    const dist = coatChances[key] || coatChances[`${c2} x ${c1}`];
    if (!dist) return c1;
    let r = Math.random(), cum = 0;
    for (const [col, prob] of Object.entries(dist)) { cum += prob; if (r < cum) return col; }
    return Object.keys(dist)[0];
  }
  function inheritEyes(e1, e2) {
    const key = `${e1} x ${e2}`;
    const dist = eyeChances[key] || eyeChances[`${e2} x ${e1}`];
    if (!dist) return e1;
    let r = Math.random(), cum = 0;
    for (const [col, prob] of Object.entries(dist)) { cum += prob; if (r < cum) return col; }
    return Object.keys(dist)[0];
  }
  function inheritPattern(p1, p2) { return randomItem(PATTERNS); }
  function inheritSecondary(parent1, parent2) {
    const pool = [];
    if (parent1.secondaryColor) pool.push(parent1.secondaryColor);
    if (parent2.secondaryColor) pool.push(parent2.secondaryColor);
    if (pool.length === 0) return null;
    return randomItem(pool);
  }

  let notifications = [];
  function addNotification(msg, targetUid = null) {
    const n = { message: msg, read: false, time: Date.now(), targetUid: targetUid || auth.currentUser?.uid };
    notifications.unshift(n);
    updateNotifDot();
  }
  function updateNotifDot() {
    const dot = document.getElementById('notif-dot');
    if (!dot) return;
    const uid = auth.currentUser?.uid;
    if (notifications.some(n => !n.read && n.targetUid === uid)) dot.classList.add('has-notifications');
    else dot.classList.remove('has-notifications');
  }

  let gameTimeInterval, serverTimeOffset = 0;
  async function getServerTime() {
    const snap = await db.collection('server').doc('time').get();
    if (snap.exists) return snap.data().timestamp;
    const now = Date.now();
    await db.collection('server').doc('time').set({ timestamp: now });
    return now;
  }
  function startClock() {
    if (gameTimeInterval) clearInterval(gameTimeInterval);
    gameTimeInterval = setInterval(() => {
      const realNow = Date.now() + serverTimeOffset;
      const gameSeconds = Math.floor(realNow / 1000) * 60;
      const totalMinutes = gameSeconds % (24 * 60);
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      const icon = (h >= 21 || h < 6) ? '🌃' : '☀️';
      const el = document.getElementById('game-time');
      if (el) el.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${icon}`;
    }, 1000);
  }

  function chooseInterface() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="bg-white p-8 rounded-lg text-center">
        <h2 class="text-2xl font-bold mb-6">Выберите режим</h2>
        <div class="flex gap-6 justify-center">
          <button id="desktop-mode" class="text-4xl p-4 bg-gray-200 rounded-lg hover:bg-gray-300">💻</button>
          <button id="mobile-mode" class="text-4xl p-4 bg-gray-200 rounded-lg hover:bg-gray-300">📱</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('desktop-mode').onclick = () => {
      localStorage.setItem('interface', 'desktop');
      document.body.classList.remove('mobile');
      modal.remove();
    };
    document.getElementById('mobile-mode').onclick = () => {
      localStorage.setItem('interface', 'mobile');
      document.body.classList.add('mobile');
      modal.remove();
    };
  }

  function showLanding() {
    app.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen"><h1 class="text-5xl font-bold text-purple-700 mb-6">🐱 Генетика котов</h1><p class="text-xl max-w-2xl mb-8 text-center">Добро пожаловать в игру про разведение кошек!</p><button id="play-btn" class="bg-purple-600 text-white px-10 py-4 rounded-full text-2xl font-bold">Играть</button></div>`;
    document.getElementById('play-btn').onclick = showAuthForm;
  }

  function showAuthForm() {
    app.innerHTML = `<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-lg shadow"><h2 class="text-2xl font-bold mb-4">Вход / Регистрация</h2><input id="nickname" placeholder="Ник" class="w-full border p-2 mb-2 rounded"><input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded"><input id="password" type="password" placeholder="Пароль" class="w-full border p-2 mb-4 rounded"><div class="flex gap-2"><button id="login-btn" class="bg-blue-500 text-white px-4 py-2 rounded flex-1">Войти</button><button id="signup-btn" class="bg-green-500 text-white px-4 py-2 rounded flex-1">Регистрация</button></div><p id="auth-error" class="text-red-500 mt-2 text-sm"></p></div>`;
    document.getElementById('login-btn').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      const n = document.getElementById('nickname').value || ('Игрок' + Math.floor(Math.random() * 10000));
      auth.signInWithEmailAndPassword(e, p)
        .then(() => {
          db.collection('users').doc(auth.currentUser.uid).update({ nickname: n });
        })
        .catch(err => document.getElementById('auth-error').innerText = err.message);
    };
    document.getElementById('signup-btn').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      const n = document.getElementById('nickname').value || ('Игрок' + Math.floor(Math.random() * 10000));
      auth.createUserWithEmailAndPassword(e, p)
        .then(() => {
          db.collection('users').doc(auth.currentUser.uid).set({ nickname: n, coins: 20, homeSize: 'маленький', catsBought: 0 });
        })
        .catch(err => document.getElementById('auth-error').innerText = err.message);
    };
  }

  function showGame(user) {
    const uid = user.uid;
    const isAdmin = user.email === 'katya2013sara1981@gmail.com';
    getServerTime().then(st => { serverTimeOffset = st - Date.now(); startClock(); });

    if (!localStorage.getItem('interface')) chooseInterface();
    else if (localStorage.getItem('interface') === 'mobile') document.body.classList.add('mobile');

    app.innerHTML = `

          <button id="logout-btn" class="bg-gray-500 text-white px-3 py-1 rounded">Выйти</button>
        </div>
      </div>
      <div class="flex border-b mb-4 flex-wrap gap-1">
        <button class="tab-link px-4 py-2 font-semibold bg-gray-200 rounded-tl-lg" data-tab="home">🏠 Дом</button>
        <button class="tab-link px-4 py-2 font-semibold" data-tab="street">🌳 Улица</button>
        <button class="tab-link px-4 py-2 font-semibold" data-tab="park">🏞️ Парк</button>
        <button class="tab-link px-4 py-2 font-semibold" data-tab="shop">🛒 Магазин</button>
        <button class="tab-link px-4 py-2 font-semibold rounded-tr-lg" data-tab="search">🔍 Поиск</button>
      </div>
      <div id="home-content" class="tab-content active"><h2 class="font-bold text-lg mb-2">Мои коты</h2><div id="my-cats" class="space-y-2"></div><button id="buy-cat-btn" class="mt-2 bg-purple-500 text-white px-3 py-1 rounded"></button><p id="home-capacity" class="text-sm text-gray-600 mt-2"></p></div>
      <div id="street-content" class="tab-content"><h2 class="font-bold text-lg mb-2">Все коты</h2><div id="all-cats" class="space-y-2 max-h-96 overflow-y-auto"></div></div>

    <div id="kitten-naming-modal" class="modal"><div class="bg-white p-6 rounded-lg max-w-md w-full relative"><h2 class="text-xl font-bold mb-4">🐱 Назовите котёнка!</h2><div id="kitten-naming-info"></div><button id="submit-kitten-name-btn" class="mt-2 bg-green-500 text-white px-4 py-2 rounded">Назвать</button></div></div>

    <div id="cat-info-modal" class="modal"><div class="bg-white p-6 rounded-lg max-w-md w-full relative"><button onclick="this.closest('.modal').classList.remove('active')" class="absolute top-2 right-2 text-xl">✕</button><div id="cat-info-content"></div><button id="family-tree-btn" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">🌳 Родословная</button></div></div>
    <div id="family-tree-modal" class="modal"><div class="bg-white p-6 rounded-lg max-w-lg w-full relative"><button onclick="this.closest('.modal').classList.remove('active')" class="absolute top-2 right-2 text-xl">✕</button><h2 class="text-xl font-bold mb-4">🌳 Родословная</h2><div id="family-tree-content"></div></div></div>
    <div id="admin-modal" class="modal"><div class="bg-white p-6 rounded-lg max-w-2xl w-full relative"><button onclick="this.closest('.modal').classList.remove('active')" class="absolute top-2 right-2 text-xl">✕</button><h2 class="text-xl font-bold mb-4">⚙️ Админ-панель</h2><div class="space-y-4"><div><h3 class="font-semibold">Создать кота</h3><input id="new-cat-name" placeholder="Имя" class="border p-1 w-full mb-1"><input id="new-cat-id" type="number" placeholder="ID" class="border p-1 w-full mb-1"><select id="new-cat-gender" class="border p-1 w-full mb-1"><option value="кот">Кот</option><option value="кошка">Кошка</option></select><select id="new-cat-age" class="border p-1 w-full mb-1"><option value="взрослый">Взрослый</option><option value="котёнок">Котёнок</option><option value="новорождённый">Новорождённый</option></select><input id="new-cat-coat" placeholder="Основной цвет" class="border p-1 w-full mb-1"><input id="new-cat-pattern" placeholder="Окрас" class="border p-1 w-full mb-1"><input id="new-cat-secondary" placeholder="Второстепенный цвет" class="border p-1 w-full mb-1"><input id="new-cat-eye" placeholder="Цвет глаз" class="border p-1 w-full mb-1"><input id="new-cat-mutation" placeholder="Мутация" class="border p-1 w-full mb-1"><input id="new-cat-character" placeholder="Характер" class="border p-1 w-full mb-1"><input id="new-cat-owner-email" placeholder="Email владельца (оставьте пустым для себя)" class="border p-1 w-full mb-1"><button id="create-cat-btn" class="bg-green-500 text-white px-3 py-1 rounded">Создать кота</button></div><div><h3 class="font-semibold mt-4">Удалить кота</h3><input id="delete-cat-id" type="number" placeholder="ID кота" class="border p-1 w-full mb-1"><button id="delete-cat-btn" class="bg-red-500 text-white px-3 py-1 rounded">Удалить</button></div><div><h3 class="font-semibold mt-4">Добавить монеты игроку</h3><input id="coins-email" placeholder="Email игрока" class="border p-1 w-full mb-1"><input id="coins-amount" type="number" placeholder="Сумма" class="border p-1 w-full mb-1"><button id="add-coins-btn" class="bg-blue-500 text-white px-3 py-1 rounded">Добавить</button></div><div><h3 class="font-semibold mt-4">Сменить ник игроку</h3><input id="nick-email" placeholder="Email игрока" class="border p-1 w-full mb-1"><input id="new-nick" placeholder="Новый ник" class="border p-1 w-full mb-1"><button id="change-nick-btn" class="bg-purple-500 text-white px-3 py-1 rounded">Сменить ник</button></div><div><h3 class="font-semibold mt-4">Все игроки</h3><div id="all-users-list" class="max-h-40 overflow-y-auto border p-2 rounded"></div></div></div></div>
    `;

    // загрузка данных пользователя
    db.collection('users').doc(uid).onSnapshot(doc => {
      if (!doc.exists) return;
      const d = doc.data();
      document.getElementById('coins-display').innerText = `💰 ${d.coins || 0}`;
      document.getElementById('current-home').innerText = d.homeSize || 'маленький';
      document.getElementById('home-limit').innerText = HOME_SIZES[d.homeSize] || 7;
      document.getElementById('home-capacity').innerText = `Вместимость дома: ${HOME_SIZES[d.homeSize] || 7}`;
      const catsBought = d.catsBought || 0;

    // Проверка беременностей
    async function checkPregnancies(cats) {
      const now = Date.now();
      for (const cat of cats) {
        if (cat.isPregnant && cat.pregnancyStart) {
          const elapsed = now - cat.pregnancyStart.toMillis();
          if (elapsed >= 300000) {
            const free = (HOME_SIZES[homeSize] || 7) + (d.extraSlots || 0) - cats.filter(c => !c.onWalk && c.owner === uid).length;
            const maxKittens = cat.litterCount === 0 ? 3 : 5;
            const count = Math.min(maxKittens, free);
            if (count <= 0) {
              await db.collection('cats').doc(cat.id).update({ isPregnant: false, pregnancyStart: null });
              continue;
            }
            const fatherId = cat.fatherId;
            let fd = {};
            if (fatherId) {
              const fs = await db.collection('cats').doc(fatherId).get();
              if (fs.exists) fd = fs.data();
            }
            const kittens = [];
            for (let i = 0; i < count; i++) {
              const coat = inheritCoat(cat.coatColor, fd.coatColor || cat.coatColor);
              const eye = inheritEyes(cat.eyeColor, fd.eyeColor || cat.eyeColor);
              const mutChance = (cat.mutation === 'гетерохромия' && fd.mutation === 'гетерохромия') ? 1 : 0.01;
              const isMut = Math.random() < mutChance;
              const eye2 = isMut ? randomItem(EYE_COLORS.filter(e => e !== eye)) : null;
              const gender = Math.random() < 0.5 ? 'кошка' : 'кот';
              const newId = (await db.collection('cats').get()).size + 1;
              kittens.push({
                owner: uid, name: '', gender, age: 'новорождённый', id: newId,
                coatColor: coat, pattern: inheritPattern(cat.pattern, fd.pattern), secondaryColor: inheritSecondary(cat, fd),
                eyeColor: eye, eyeColor2: eye2, mutation: isMut ? 'гетерохромия' : 'отсутствует',
                character: randomItem(CHARACTERS), isPregnant: false, pregnancyStart: null, litterCount: 0, onWalk: false,
                motherId: cat.id, fatherId: cat.fatherId || null, state: 'новорождённый', birthTime: Date.now(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            }
            await db.collection('cats').doc(cat.id).update({ isPregnant: false, pregnancyStart: null, litterCount: firebase.firestore.FieldValue.increment(1), state: 'уставшая', restUntil: Date.now() + 120000 });
            showKittenNaming(kittens, 0);
          }
        }
      }
    }

    async function checkAges(cats) {
      const now = Date.now();
      for (const cat of cats) {
        if (cat.age === 'новорождённый' && cat.birthTime && (now - cat.birthTime) >= 120000) {
          await db.collection('cats').doc(cat.id).update({ age: 'котёнок' });
        } else if (cat.age === 'котёнок' && cat.birthTime && (now - cat.birthTime) >= 420000) {
          await db.collection('cats').doc(cat.id).update({ age: 'взрослый' });
        }
        if (cat.state === 'уставшая' && cat.restUntil && now >= cat.restUntil) {
          await db.collection('cats').doc(cat.id).update({ state: 'лежит', restUntil: null });
        }
      }
    }

        await db.collection('cats').doc(cid).update({ state: 'лежит', restUntil: null });
        document.getElementById('inventory-message').innerText = 'Кот повеселел!';
        document.getElementById('inventory-modal').classList.remove('active');
      }
    };

    // Просмотр кота
    window.showCatInfo = async (catId) => {
      const doc = await db.collection('cats').doc(catId).get();
      if (!doc.exists) return;
      const c = doc.data();
      document.getElementById('cat-info-content').innerHTML = `
        Имя: ${c.name}<br>Пол: {${c.gender === 'кот' ? 'мальчик' : 'девочка'}}<br>ID: [${String(c.id).padStart(4,'0')}]<br>
        Возраст: ${c.age}<br>Основной цвет: ${c.coatColor}<br>Окрас: ${c.pattern}<br>
        Второстепенный: ${c.secondaryColor || 'нет'}<br>Глаза: ${c.eyeColor}${c.eyeColor2 ? ', ' + c.eyeColor2 : ''}<br>
        Мутация: ${c.mutation}<br>Характер: ${c.character}<br>Состояние: ${c.state}
      `;
      document.getElementById('cat-info-modal').classList.add('active');
      document.getElementById('family-tree-btn').onclick = () => showFamilyTree(catId);
    };
    window.showFamilyTree = async (catId) => {
      const doc = await db.collection('cats').doc(catId).get();
      if (!doc.exists) return;
      const target = doc.data();
      const allCatsSnap = await db.collection('cats').where('owner', '==', uid).get();
      const allCats = [];
      allCatsSnap.forEach(d => allCats.push({ id: d.id, ...d.data() }));
      const relations = allCats.map(c => {
        let rel = 'Незнакомец';
        if (c.id === target.motherId) rel = 'Мама';
        else if (c.id === target.fatherId) rel = 'Папа';
        else if (c.motherId === target.motherId && c.fatherId === target.fatherId) rel = 'Брат/Сестра';
        else if (c.id === target.id) rel = 'Это сам кот';
        else {
          if (target.motherId) {
            const mom = allCats.find(x => x.id === target.motherId);
            if (mom && (c.id === mom.motherId || c.id === mom.fatherId)) rel = 'Бабушка/Дедушка';
          }
          if (target.fatherId) {
            const dad = allCats.find(x => x.id === target.fatherId);
            if (dad && (c.id === dad.motherId || c.id === dad.fatherId)) rel = 'Бабушка/Дедушка';
          }
          if (rel === 'Незнакомец') {
            if (c.motherId === target.motherId || c.fatherId === target.fatherId) rel = 'Дальний родственник';
          }
        }
        return `<p>${c.name} {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4,'0')}] — ${rel}</p>`;
      }).join('');
      document.getElementById('family-tree-content').innerHTML = relations;
      document.getElementById('family-tree-modal').classList.add('active');
    };

    // Поиск
    document.getElementById('search-btn').onclick = async () => {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const snap = await db.collection('cats').get();
      const res = [];
      snap.forEach(doc => {
        const c = doc.data();
        if (c.name.toLowerCase().includes(q) || String(c.id) === q) res.push(c);
      });
      document.getElementById('search-results').innerHTML = res.map(c => `
        <div class="border p-2 rounded text-sm">
          <span class="font-bold text-blue-600 cursor-pointer" onclick="showCatInfo('${c.id}')">${c.name}</span>
          {${c.gender === 'кот' ? 'мальчик' : 'девочка'}} [${String(c.id).padStart(4,'0')}] – ${c.coatColor}, ${c.eyeColor}
        </div>`).join('');
    };

    // Трейды
    document.getElementById('trade-nick').addEventListener('input', async (e) => {
      const nick = e.target.value.trim();
      if (nick.length < 2) return;
      const usersSnap = await db.collection('users').where('nickname', '==', nick).get();
      if (!usersSnap.empty) {
        const toUid = usersSnap.docs[0].id;
        const catsSnap = await db.collection('cats').where('owner', '==', toUid).get();
        const catOpts = [];
        catsSnap.forEach(doc => catOpts.push(`<option value="${doc.id}">${doc.data().name}</option>`));
        document.getElementById('trade-their-cat').innerHTML = '<option value="">-- не выбран --</option>' + catOpts.join('');
        const userDoc = await db.collection('users').doc(toUid).get();
        const items = userDoc.data().items || [];
        const itemOpts = items.map(i => `<option value="${i}">${i}</option>`).join('');
        document.getElementById('trade-their-item').innerHTML = '<option value="">-- не выбран --</option>' + itemOpts;
      }
    });

    document.getElementById('send-trade-btn').onclick = async () => {
      const toNick = document.getElementById('trade-nick').value.trim();
      const myCatId = document.getElementById('trade-my-cat').value;
      const theirCatId = document.getElementById('trade-their-cat').value;
      const myItem = document.getElementById('trade-my-item').value;
      const theirItem = document.getElementById('trade-their-item').value;
      const myCoins = parseInt(document.getElementById('trade-my-coins').value) || 0;
      const theirCoins = parseInt(document.getElementById('trade-their-coins').value) || 0;

      if (!toNick) return;
      const usersSnap = await db.collection('users').where('nickname', '==', toNick).get();
      if (usersSnap.empty) { alert('Игрок не найден.'); return; }
      const toUid = usersSnap.docs[0].id;

      if (myCatId) {
        const catDoc = await db.collection('cats').doc(myCatId).get();
        if (!catDoc.exists || catDoc.data().owner !== uid) { alert('Выбранный вами кот не существует или не ваш.'); return; }
      }
      if (myItem) {
        const userDoc = await db.collection('users').doc(uid).get();
        if (!userDoc.data().items || !userDoc.data().items.includes(myItem)) { alert('У вас нет такого предмета.'); return; }
      }

      const tradeRef = await db.collection('trades').add({
        from: uid, to: toUid,
        myCatId: myCatId || null, myCatName: myCatId ? (await db.collection('cats').doc(myCatId).get()).data().name : null,
        theirCatId: theirCatId || null, theirCatName: theirCatId ? (await db.collection('cats').doc(theirCatId).get()).data().name : null,
        myItem: myItem || null,
        theirItem: theirItem || null,
        myCoins, theirCoins,
        status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      addNotification(`Вам пришёл трейд! Посмотреть: 👁`, toUid);
      // сохраняем информацию о трейде в уведомлении
      const tradeNotif = notifications.find(n => n.targetUid === toUid && n.message.includes('Вам пришёл трейд'));
      if (tradeNotif) tradeNotif.tradeId = tradeRef.id;
    };

    window.viewTrade = async (tradeId) => {
      const tradeDoc = await db.collection('trades').doc(tradeId).get();
      if (!tradeDoc.exists) return;
      const t = tradeDoc.data();
      const modal = document.createElement('div');
      modal.className = 'modal active';
      modal.innerHTML = `
        <div class="bg-white p-6 rounded-lg max-w-md w-full relative">
          <button onclick="this.closest('.modal').remove()" class="absolute top-2 right-2 text-xl">✕</button>
          <h2 class="text-xl font-bold mb-4">Детали трейда</h2>
          <p><strong>От:</strong> ${t.fromNick || (await db.collection('users').doc(t.from).get()).data().nickname}</p>
          <p><strong>Предлагает:</strong></p>
          <ul>
            ${t.myCatId ? '<li>Кот: ' + t.myCatName + '</li>' : ''}
            ${t.myItem ? '<li>Предмет: ' + t.myItem + '</li>' : ''}
            ${t.myCoins ? '<li>Монеты: ' + t.myCoins + '</li>' : ''}
          </ul>
          <p><strong>Хочет получить от вас:</strong></p>
          <ul>
            ${t.theirCatId ? '<li>Кот: ' + t.theirCatName + '</li>' : ''}
            ${t.theirItem ? '<li>Предмет: ' + t.theirItem + '</li>' : ''}
            ${t.theirCoins ? '<li>Монеты: ' + t.theirCoins + '</li>' : ''}
          </ul>
          <div class="flex gap-2 mt-4">
            <button onclick="acceptTrade('${tradeId}')" class="bg-green-500 text-white px-4 py-2 rounded">Принять</button>
            <button onclick="declineTrade('${tradeId}')" class="bg-red-500 text-white px-4 py-2 rounded">Отклонить</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.acceptTrade = async (tradeId) => {
      const tradeDoc = await db.collection('trades').doc(tradeId).get();
      const t = tradeDoc.data();
      if (t.status !== 'pending') return;

      const userDoc = await db.collection('users').doc(uid).get();
      if (t.theirCatId) {
        const catDoc = await db.collection('cats').doc(t.theirCatId).get();
        if (!catDoc.exists || catDoc.data().owner !== uid) { alert('У вас нет запрашиваемого кота.'); return; }
      }
      if (t.theirItem) {
        const items = userDoc.data().items || [];
        if (!items.includes(t.theirItem)) { alert('У вас нет запрашиваемого предмета.'); return; }
      }
      if (t.theirCoins) {
        if ((userDoc.data().coins || 0) < t.theirCoins) { alert('У вас не хватает монет.'); return; }
      }

      const batch = db.batch();
      if (t.myCatId) batch.update(db.collection('cats').doc(t.myCatId), { owner: uid });
      if (t.theirCatId) batch.update(db.collection('cats').doc(t.theirCatId), { owner: t.from });
      if (t.myItem) {
        batch.update(db.collection('users').doc(uid), { items: firebase.firestore.FieldValue.arrayUnion(t.myItem) });
        batch.update(db.collection('users').doc(t.from), { items: firebase.firestore.FieldValue.arrayRemove(t.myItem) });
      }
      if (t.theirItem) {
        batch.update(db.collection('users').doc(t.from), { items: firebase.firestore.FieldValue.arrayUnion(t.theirItem) });
        batch.update(db.collection('users').doc(uid), { items: firebase.firestore.FieldValue.arrayRemove(t.theirItem) });
      }
      if (t.myCoins) {
        batch.update(db.collection('users').doc(uid), { coins: firebase.firestore.FieldValue.increment(t.myCoins) });
        batch.update(db.collection('users').doc(t.from), { coins: firebase.firestore.FieldValue.increment(-t.myCoins) });
      }
      if (t.theirCoins) {
        batch.update(db.collection('users').doc(t.from), { coins: firebase.firestore.FieldValue.increment(t.theirCoins) });
        batch.update(db.collection('users').doc(uid), { coins: firebase.firestore.FieldValue.increment(-t.theirCoins) });
      }
      batch.update(db.collection('trades').doc(tradeId), { status: 'accepted' });
      await batch.commit();
      addNotification('Трейд успешно завершён.');
      document.querySelector('.modal.active')?.remove();
    };

    window.declineTrade = async (tradeId) => {
      await db.collection('trades').doc(tradeId).update({ status: 'declined' });
      addNotification('Трейд отклонён.');
      document.querySelector('.modal.active')?.remove();
    };

    // Админка
    if (isAdmin) {
      document.getElementById('admin-btn').onclick = async () => {
        document.getElementById('admin-modal').classList.add('active');
        const usersSnap = await db.collection('users').get();
        const users = [];
        usersSnap.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
        document.getElementById('all-users-list').innerHTML = users.map(u => `<p>${u.nickname} (${u.id}) – 💰${u.coins||0}</p>`).join('');
      };
      document.getElementById('create-cat-btn').onclick = async () => {
        const name = document.getElementById('new-cat-name').value || 'Кот';
        const id = parseInt(document.getElementById('new-cat-id').value) || (await db.collection('cats').get()).size + 1;
        const gender = document.getElementById('new-cat-gender').value;
        const age = document.getElementById('new-cat-age').value;
        const coat = document.getElementById('new-cat-coat').value || 'серый';
        const pattern = document.getElementById('new-cat-pattern').value || 'однотонный';
        const secondary = document.getElementById('new-cat-secondary').value || null;
        const eye = document.getElementById('new-cat-eye').value || 'зеленый';
        const mutation = document.getElementById('new-cat-mutation').value || 'отсутствует';
        const character = document.getElementById('new-cat-character').value || 'добрый';
        const ownerEmail = document.getElementById('new-cat-owner-email').value.trim() || user.email;
        const ownerSnap = await db.collection('users').where(firebase.firestore.FieldPath.documentId(), '==', ownerEmail).get();
        let ownerUid = uid;
        if (!ownerSnap.empty) ownerUid = ownerSnap.docs[0].id;
        await db.collection('cats').add({
          owner: ownerUid, name, gender, age, id,
          coatColor: coat, pattern, secondaryColor: secondary || null,
          eyeColor: eye, eyeColor2: mutation === 'гетерохромия' ? randomItem(EYE_COLORS.filter(e => e !== eye)) : null,
          mutation, character, isPregnant: false, pregnancyStart: null, litterCount: 0, onWalk: false,
          motherId: null, fatherId: null, state: 'лежит',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert('Кот создан!');
      };
      document.getElementById('delete-cat-btn').onclick = async () => {
        const id = parseInt(document.getElementById('delete-cat-id').value);
        if (!id) return;
        const snap = await db.collection('cats').where('id', '==', id).get();
        snap.forEach(async doc => { await db.collection('cats').doc(doc.id).delete(); });
        alert('Кот удалён.');
      };
      document.getElementById('add-coins-btn').onclick = async () => {
        const email = document.getElementById('coins-email').value.trim();
        const amount = parseInt(document.getElementById('coins-amount').value);
        if (!email || !amount) return;
        const snap = await db.collection('users').where(firebase.firestore.FieldPath.documentId(), '==', email).get();
        if (snap.empty) { alert('Игрок не найден.'); return; }
        snap.forEach(async doc => { await db.collection('users').doc(doc.id).update({ coins: firebase.firestore.FieldValue.increment(amount) }); });
        alert('Монеты добавлены!');
      };
      document.getElementById('change-nick-btn').onclick = async () => {
        const email = document.getElementById('nick-email').value.trim();
        const newNick = document.getElementById('new-nick').value.trim();
        if (!email || !newNick) return;
        const snap = await db.collection('users').where(firebase.firestore.FieldPath.documentId(), '==', email).get();
        if (snap.empty) { alert('Игрок не найден.'); return; }
        const exist = await db.collection('users').where('nickname', '==', newNick).get();
        if (!exist.empty) { alert('Такой ник занят.'); return; }
        snap.forEach(async doc => { await db.collection('users').doc(doc.id).update({ nickname: newNick }); });
        alert('Ник изменён!');
      };
    }

    document.getElementById('logout-btn').onclick = () => auth.signOut();
  }

  window.buyHome = async (size, price) => {
    const uDoc = await db.collection('users').doc(auth.currentUser.uid).get();
    const coins = uDoc.data().coins || 0;
    if (coins < price) { alert('У вас недостаточно монет!'); return; }
    if (HOME_SIZES[size] <= HOME_SIZES[uDoc.data().homeSize]) { alert('У вас уже есть дом такого или большего размера.'); return; }
    await db.collection('users').doc(auth.currentUser.uid).update({
      coins: firebase.firestore.FieldValue.increment(-price),
      homeSize: size
    });
    alert(`Вы успешно купили дом: ${size}`);
  };

  auth.onAuthStateChanged(user => user ? showGame(user) : showLanding());
</script>
</body>
  </html>
