        .tab-btn {
            background: #47432e;

        hr { border-color: #ffd58c; margin: 15px 0; }
        .market-item {

            .cats-grid { flex-direction: column; align-items: center; }

            position: fixed;

            background: #222;
            color: gold;
            padding: 12px 24px;

        }

<body>
<div class="app-container" id="appRoot">
    <div id="authContainer"></div>
    <div id="gameContainer" style="display:none;">
        <div class="flex-between">
            <h1>🐾 CatGenetics 🧬</h1>
            <div><span id="userBalance">💰 0</span> 🪙 &nbsp; <span id="userName"></span> <button id="logoutBtn">🚪 Выйти</button></div>
        </div>
        <div class="tabs" id="tabsMenu">
            <button class="tab-btn active" data-tab="mycats">🐱 Мои коты</button>
            <button class="tab-btn" data-tab="breed">🧬 Разведение</button>
            <button class="tab-btn" data-tab="market">🏪 Рынок & Обмен</button>
            <button class="tab-btn" data-tab="care">❤️ Уход & Задания</button>
            <button class="tab-btn" data-tab="shop">🛒 Магазин</button>
            <button class="tab-btn admin-tab" data-tab="admin" style="display:none;">👑 Админ панель</button>
        </div>
        <div id="mycats" class="content-pane active">🐈 Ваши питомцы появляются здесь...</div>
        <div id="breed" class="content-pane">🧬 Выберите родителей для вязки</div>
        <div id="market" class="content-pane">🏪 Торговая площадка</div>
        <div id="care" class="content-pane">❤️ Кормите, играйте, повышайте здоровье и счастье</div>
        <div id="shop" class="content-pane">🛒 Магазин: котята и предметы</div>
        <div id="admin" class="content-pane admin-section">🔧 Администраторские инструменты</div>
    </div>
</div>
<script>
    // ---------- FIREBASE INIT ----------
    const firebaseConfig = {
        apiKey: "AIzaSyC0b58JT-x3te0LZmWQv5qA2mzG026ycK8",
        authDomain: "cat-games-v1.firebaseapp.com",
        projectId: "cat-games-v1",
        storageBucket: "cat-games-v1.firebasestorage.app",
        messagingSenderId: "357590792729",
        appId: "1:357590792729:web:7c40d851c8f09d5b388888",
        measurementId: "G-QMY9FRLTJL"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ---------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ----------
    let currentUser = null;
    let userDocRef = null;
    let catsListener = null;
    let marketListener = null;
    let allCats = [];

    // ---------- ГЕНЕТИЧЕСКАЯ МОДЕЛЬ (расширенная) ----------
    // Гены: базовый цвет (B/b), дилюция (D/d), оранжевый (O/o), табби (T/t), белые пятна (W/w), цвет глаз (G/g)
    // Создание случайного генотипа с весами редкости
    function randomGene(dominantProb = 0.6) {
        return Math.random() < dominantProb ? 'dominant' : 'recessive';
    }
    function generateRandomGenes() {
        return {
            baseColor: randomGene(0.65) === 'dominant' ? 'B' : 'b',   // B = черный, b = шоколадный
            dilution: randomGene(0.4) === 'dominant' ? 'D' : 'd',     // D = плотный, d = дилюция
            orange: randomGene(0.35) === 'dominant' ? 'O' : 'o',       // O = рыжий фактор
            tabby: randomGene(0.7) === 'dominant' ? 'T' : 't',         // T = полосатый узор
            whiteSpotting: randomGene(0.25) === 'dominant' ? 'W' : 'w', // W = белые пятна
            eyeColor: randomGene(0.5) === 'dominant' ? 'G' : 'g'        // G = зеленые, g = голубые
        };
    }
    // фенотип на основе генотипа
    function computePhenotype(genes) {
        let color = "";
        if (genes.orange === 'O') color = "Рыжий/Кремовый";
        else color = (genes.baseColor === 'B' ? "Черный" : "Шоколадный");
        if (genes.dilution === 'd') color = (color === "Черный" ? "Голубой" : (color === "Шоколадный" ? "Лиловый" : (color === "Рыжий/Кремовый" ? "Кремовый" : color)));
        let pattern = genes.tabby === 'T' ? "Полосатый (табби)" : "Сплошной";
        let white = genes.whiteSpotting === 'W' ? " + белые отметины" : "";
        let eyes = genes.eyeColor === 'G' ? "Зеленые глаза" : "Голубые глаза";
        return `${color} ${pattern}${white}, ${eyes}`;
    }
    // наследование: потомок получает по одному аллелю от каждого родителя (упрощённо, но реалистично)
    function inheritGenes(parentGenesA, parentGenesB) {
        const getAllele = (geneObj, geneKey) => {
            let val = geneObj[geneKey];
            return val === 'B' || val === 'b' ? val : (val === 'D' || val === 'd' ? val : (val === 'O' || val === 'o' ? val : (val === 'T' || val === 't' ? val : (val === 'W' || val === 'w' ? val : (val === 'G' || val === 'g' ? val : 'B')))));
        };
        const combine = (g1, g2) => {
            let alleles = [g1, g2];
            let dominantOrder = { 'B':1,'b':2,'D':1,'d':2,'O':1,'o':2,'T':1,'t':2,'W':1,'w':2,'G':1,'g':2 };
            let pick = alleles.sort((a,b)=>dominantOrder[a]-dominantOrder[b])[0];
            return pick;
        };
        let newGenes = {};
        for(let key of ['baseColor','dilution','orange','tabby','whiteSpotting','eyeColor']) {
            let a = getAllele(parentGenesA, key);
            let b = getAllele(parentGenesB, key);
            newGenes[key] = combine(a,b);
        }
        return newGenes;
    }

    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function showToast(msg, isErr=false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        toast.style.backgroundColor = isErr ? '#7a2e2e' : '#2c5f2d';
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(), 3000);
    }

    async function updateUserBalanceUI() {
        if(currentUser && userDocRef) {
            let doc = await userDocRef.get();
            if(doc.exists) document.getElementById('userBalance').innerHTML = `💰 ${doc.data().balance || 100}`;
        }
    }

    // создание кота
    async function createCat(ownerId, name, gender, parents = null, customGenes = null) {
        let genes = customGenes ? customGenes : generateRandomGenes();
        let phenotype = computePhenotype(genes);
        let catData = {
            ownerId, name, gender, ageMonths: 2, health: 85, happiness: 80, generation: parents ? 2 : 1,
            genes, phenotype, isPregnant: false, pregnantWith: null, pregnancyProgress: 0,
            lastCare: Date.now(), rarityScore: Math.floor(Math.random()*50)+50,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        let ref = await db.collection('cats').add(catData);
        showToast(`🐈 Кот ${name} (${phenotype}) появился!`);
        return ref.id;
    }

    // вязка (свои коты)
    async function breedCats(motherId, fatherId, userId) {
        let motherSnap = await db.collection('cats').doc(motherId).get();
        let fatherSnap = await db.collection('cats').doc(fatherId).get();
        if(!motherSnap.exists || !fatherSnap.exists) throw new Error("Кот не найден");
        let mother = motherSnap.data(), father = fatherSnap.data();
        if(mother.ownerId !== userId || father.ownerId !== userId) throw new Error("Владелец не совпадает");
        if(mother.gender !== 'female' || father.gender !== 'male') throw new Error("Пол родителей не подходит");
        if(mother.ageMonths < 6 || father.ageMonths < 6) throw new Error("Возраст менее 6 месяцев");
        if(mother.health < 60 || father.health<60) throw new Error("Здоровье низкое");
        let kittenGenes = inheritGenes(mother.genes, father.genes);
        let name = `Котенок ${Math.floor(Math.random()*1000)}`;
        await createCat(userId, name, Math.random()<0.5?'female':'male', [motherId, fatherId], kittenGenes);
        showToast("✨ Вязка успешна! Родился новый котёнок!");
    }

    // ежедневный уход (увеличивает здоровье/счастье)
    async function careCat(catId, action) {
        let ref = db.collection('cats').doc(catId);
        let doc = await ref.get();
        if(!doc.exists) return;
        let data = doc.data();
        let newHealth = data.health + (action==='feed'? 8 : action==='play'? 5 : 3);
        let newHappiness = data.happiness + (action==='play'? 12 : action==='clean'? 6 : 4);
        await ref.update({ health: Math.min(100,newHealth), happiness: Math.min(100,newHappiness), lastCare: Date.now() });
        showToast(`❤️ + уход! Здоровье ${data.health}→${Math.min(100,newHealth)}`);
    }

    // ---------- UI ОТРИСОВКА ----------
    async function renderMyCats() {
        let container = document.getElementById('mycats');
        if(!currentUser) return;
        let snapshot = await db.collection('cats').where('ownerId','==',currentUser.uid).get();
        allCats = snapshot.docs.map(d=>{return {id:d.id, ...d.data()};});
        if(allCats.length===0) { container.innerHTML = '<p>У вас нет котов. Купите в магазине или получите первого бесплатно! <button id="getStarterCat">🎁 Взять стартового кота</button></p>';
            document.getElementById('getStarterCat')?.addEventListener('click',()=> createCat(currentUser.uid, 'Пушистик', Math.random()<0.5?'male':'female'));
            return;
        }
        let html = `<div class="cats-grid">`;
        for(let cat of allCats) {
            html += `<div class="cat-card" data-id="${cat.id}">
                        <h3>🐾 ${cat.name}</h3>
                        <p>🧬 ${cat.phenotype}</p>
                        <p>⚤ ${cat.gender==='male'?'♂ Кот':'♀ Кошка'} | Возраст: ${cat.ageMonths} мес</p>
                        <p>❤️ Здоровье ${cat.health} | 😊 Счастье ${cat.happiness}</p>
                        <div><button class="feedBtn" data-id="${cat.id}">🍖 Кормить</button>
                        <button class="playBtn" data-id="${cat.id}">🎾 Играть</button></div>
                        <button class="sellBtn" data-id="${cat.id}" data-name="${cat.name}">💲 Выставить на рынок</button>
                    </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        document.querySelectorAll('.feedBtn').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); careCat(btn.dataset.id,'feed');}));
        document.querySelectorAll('.playBtn').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); careCat(btn.dataset.id,'play');}));
        document.querySelectorAll('.sellBtn').forEach(btn=>btn.addEventListener('click',async(e)=>{
            let price = prompt("Цена продажи (монеты):", "200");
            if(price && !isNaN(price)) {
                await db.collection('market').add({ catId: btn.dataset.id, sellerId: currentUser.uid, price: parseInt(price), catName: btn.dataset.name, timestamp: Date.now() });
                showToast(`Кот выставлен за ${price} монет`);
                renderMarket();
            }
        }));
    }

    async function renderBreed() {
        let container = document.getElementById('breed');
        if(!currentUser) return;
        let catsSnap = await db.collection('cats').where('ownerId','==',currentUser.uid).get();
        let userCats = catsSnap.docs.map(d=>{return {id:d.id, ...d.data()};});
        let males = userCats.filter(c=>c.gender==='male');
        let females = userCats.filter(c=>c.gender==='female');
        if(males.length===0 || females.length===0) { container.innerHTML = '<p>❌ Нужны хотя бы один кот и одна кошка для разведения.</p>'; return; }
        let html = `<h3>🧬 Разведение котов</h3><div><label>Мать (кошка):</label><select id="motherSelect">${females.map(f=>`<option value="${f.id}">${f.name} (❤️${f.health})</option>`).join('')}</select></div>
        <div><label>Отец (кот):</label><select id="fatherSelect">${males.map(m=>`<option value="${m.id}">${m.name} (❤️${m.health})</option>`).join('')}</select></div>
        <button id="startBreed">💞 Провести вязку</button><div id="breedResult"></div>`;
        container.innerHTML = html;
        document.getElementById('startBreed').onclick = async () => {
            let motherId = document.getElementById('motherSelect').value;
            let fatherId = document.getElementById('fatherSelect').value;
            try { await breedCats(motherId, fatherId, currentUser.uid); renderMyCats(); renderBreed(); } catch(e) { showToast(e.message, true); }
        };
    }

    async function renderMarket() {
        let container = document.getElementById('market');
        let marketSnap = await db.collection('market').get();
        let listings = marketSnap.docs.map(d=>{return {id:d.id, ...d.data()};});
        if(listings.length===0) { container.innerHTML = '<p>🏷️ Нет активных объявлений. Выставьте своего кота!</p>'; return; }
        let html = `<div class="cats-grid">`;
        for(let item of listings) {
            let catSnap = await db.collection('cats').doc(item.catId).get();
            if(!catSnap.exists) continue;
            let cat = catSnap.data();
            html += `<div class="market-item"><b>🐱 ${cat.name}</b> | ${cat.phenotype}<br>💰 Цена: ${item.price} 🪙<br>👤 Продавец: ${item.sellerId.slice(0,6)}<br><button class="buyBtn" data-id="${item.id}" data-cat="${item.catId}" data-price="${item.price}">Купить</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        document.querySelectorAll('.buyBtn').forEach(btn=>btn.addEventListener('click', async (e)=>{
            let listingId = btn.dataset.id, catIdRef = btn.dataset.cat, price = parseInt(btn.dataset.price);
            let userDoc = await db.collection('users').doc(currentUser.uid).get();
            let balance = userDoc.data().balance;
            if(balance < price) { showToast("Недостаточно монет!", true); return; }
            await db.runTransaction(async (transaction)=>{
                let catRef = db.collection('cats').doc(catIdRef);
                let catDoc = await transaction.get(catRef);
                if(catDoc.data().ownerId === currentUser.uid) throw new Error("Нельзя купить своего кота");
                transaction.update(catRef, { ownerId: currentUser.uid });
                transaction.update(db.collection('users').doc(currentUser.uid), { balance: balance - price });
                let sellerRef = db.collection('users').doc(catDoc.data().ownerId);
                let sellerDoc = await transaction.get(sellerRef);
                transaction.update(sellerRef, { balance: (sellerDoc.data().balance||0) + price });
                transaction.delete(db.collection('market').doc(listingId));
            });
            showToast("Покупка успешна!");
            renderMarket(); renderMyCats(); updateUserBalanceUI();
        }));
    }

    async function renderCare() {
        let container = document.getElementById('care');
        let catsSnap = await db.collection('cats').where('ownerId','==',currentUser.uid).get();
        let cats = catsSnap.docs.map(d=>{return {id:d.id, ...d.data()};});
        if(cats.length===0) { container.innerHTML = '<p>Нет котов для ухода.</p>'; return; }
        let html = `<h3>🐾 Уход за питомцами</h3><div class="cats-grid">`;
        for(let cat of cats) {
            html += `<div class="cat-card"><b>${cat.name}</b><br>❤️ Здоровье ${cat.health} | 😊 Счастье ${cat.happiness}<br>
            <button class="careFeed" data-id="${cat.id}">🍖 Корм (+8 здоровье)</button>
            <button class="carePlay" data-id="${cat.id}">🎾 Игра (+12 счастье)</button>
            <button class="careClean" data-id="${cat.id}">🧼 Чистка (+6 обоим)</button></div>`;
        }
        html += `</div><div><h3>Ежедневный бонус 🎁</h3><button id="dailyBonus">Получить 150 монет + лакомство</button></div>`;
        container.innerHTML = html;
        document.querySelectorAll('.careFeed').forEach(b=>b.addEventListener('click',()=>careCat(b.dataset.id,'feed')));
        document.querySelectorAll('.carePlay').forEach(b=>b.addEventListener('click',()=>careCat(b.dataset.id,'play')));
        document.querySelectorAll('.careClean').forEach(b=>b.addEventListener('click',()=>careCat(b.dataset.id,'clean')));
        document.getElementById('dailyBonus')?.addEventListener('click', async ()=>{
            let userData = await userDocRef.get();
            let lastBonus = userData.data().lastBonus || 0;
            if(Date.now()-lastBonus < 86400000) { showToast("Бонус уже получен сегодня!", true); return; }
            await userDocRef.update({ balance: (userData.data().balance || 100) + 150, lastBonus: Date.now() });
            updateUserBalanceUI();
            showToast("🎉 +150 монет! Заботьтесь о котах!");
        });
    }

    async function renderShop() {
        let container = document.getElementById('shop');
        container.innerHTML = `<h3>🏪 Котята на продажу</h3>
        <div><button id="buyRandomKitten">🎲 Случайный котёнок (200 🪙)</button>
        <button id="buyRareKitten">✨ Редкий котёнок (650 🪙)</button></div>
        <div id="shopResult"></div>`;
        document.getElementById('buyRandomKitten')?.addEventListener('click', async ()=>{
            let userData = await userDocRef.get();
            if(userData.data().balance < 200) { showToast("Недостаточно монет", true); return; }
            await userDocRef.update({ balance: userData.data().balance - 200 });
            let genes = generateRandomGenes();
            await createCat(currentUser.uid, `Магик ${Math.floor(Math.random()*100)}`, Math.random()<0.5?'male':'female', null, genes);
            updateUserBalanceUI(); renderMyCats();
        });
        document.getElementById('buyRareKitten')?.addEventListener('click', async ()=>{
            let userData = await userDocRef.get();
            if(userData.data().balance < 650) { showToast("Недостаточно монет", true); return; }
            await userDocRef.update({ balance: userData.data().balance - 650 });
            let rareGenes = { baseColor:'B', dilution:'D', orange:'O', tabby:'T', whiteSpotting:'W', eyeColor:'G' };
            await createCat(currentUser.uid, `Легенда ${Date.now().toString().slice(-4)}`, Math.random()<0.5?'male':'female', null, rareGenes);
            updateUserBalanceUI(); renderMyCats();
        });
    }

    // АДМИН-ПАНЕЛЬ (только для админов)
    async function renderAdmin() {
        if(!currentUser) return;
        let userSnap = await userDocRef.get();
        let isAdmin = userSnap.data()?.isAdmin === true;
        if(!isAdmin) { document.getElementById('admin').innerHTML = '<p>🚫 Доступ запрещен. Вы не администратор.</p>'; return; }
        let usersSnap = await db.collection('users').get();
        let usersList = usersSnap.docs.map(d=>{return {id:d.id, ...d.data()};});
        let html = `<h2>🔧 Админ управление</h2>
        <button id="addAdminCoinBtn">➕ Выдать 5000 монет ВСЕМ игрокам</button>
        <button id="spawnLegendaryCat">🐉 Создать легендарного кота админу</button>
        <hr><h3>Список пользователей:</h3><ul>`;
        for(let u of usersList) html += `<li>${u.email} | Баланс: ${u.balance} | Админ: ${u.isAdmin?'✅':'❌'} <button class="toggleAdminBtn" data-id="${u.id}">сменить админку</button></li>`;
        html += `</ul>`;
        document.getElementById('admin').innerHTML = html;
        document.getElementById('addAdminCoinBtn')?.addEventListener('click', async ()=>{
            let allUsers = await db.collection('users').get();
            for(let doc of allUsers.docs) await doc.ref.update({ balance: (doc.data().balance||0)+5000 });
            showToast("💰 5000 монет выданы всем");
            updateUserBalanceUI();
        });
        document.getElementById('spawnLegendaryCat')?.addEventListener('click', async ()=>{
            let superGenes = { baseColor:'B', dilution:'D', orange:'O', tabby:'T', whiteSpotting:'W', eyeColor:'G' };
            await createCat(currentUser.uid, `Астральный Творец`, 'male', null, superGenes);
            renderMyCats();
        });
        document.querySelectorAll('.toggleAdminBtn').forEach(btn=>btn.addEventListener('click',async (e)=>{
            let uid = btn.dataset.id;
            let targetRef = db.collection('users').doc(uid);
            let tDoc = await targetRef.get();
            await targetRef.update({ isAdmin: !tDoc.data().isAdmin });
            renderAdmin();
        }));
    }

    // переключение вкладок
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let tabId = btn.dataset.tab;
                document.querySelectorAll('.content-pane').forEach(p=>p.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                if(tabId==='mycats') renderMyCats();
                if(tabId==='breed') renderBreed();
                if(tabId==='market') renderMarket();
                if(tabId==='care') renderCare();
                if(tabId==='shop') renderShop();
                if(tabId==='admin') renderAdmin();
            });
        });
    }

    // АУТЕНТИФИКАЦИЯ
    function renderAuth() {
        let authHtml = `<div class="auth-panel"><h2>🐱 CatGenetics - Вход</h2>
        <div class="input-group"><input type="email" id="loginEmail" placeholder="Email"><input type="password" id="loginPass" placeholder="Пароль"><button id="loginBtn">Войти</button></div>
        <hr><div class="input-group"><input type="email" id="regEmail" placeholder="Email"><input type="password" id="regPass" placeholder="Пароль"><button id="registerBtn">Регистрация</button></div></div>`;
        document.getElementById('authContainer').innerHTML = authHtml;
        document.getElementById('loginBtn').onclick = async () => {
            let email = document.getElementById('loginEmail').value, pass = document.getElementById('loginPass').value;
            try{ await auth.signInWithEmailAndPassword(email,pass); } catch(e){ showToast("Ошибка: "+e.message, true); }
        };
        document.getElementById('registerBtn').onclick = async () => {
            let email = document.getElementById('regEmail').value, pass = document.getElementById('regPass').value;
            try{
                let cred = await auth.createUserWithEmailAndPassword(email,pass);
                await db.collection('users').doc(cred.user.uid).set({ email: email, balance: 300, isAdmin: false, lastBonus: 0, username: email.split('@')[0] });
                await createCat(cred.user.uid, 'Стартовый Кот', 'male');
                await createCat(cred.user.uid, 'Пушистая Принцесса', 'female');
                showToast("Аккаунт создан! Вы получили двух котов + 300 монет");
            } catch(e){ showToast(e.message, true);}
        };
    }

    auth.onAuthStateChanged(async (user)=>{
        if(user){
            currentUser = user;
            userDocRef = db.collection('users').doc(user.uid);
            let snap = await userDocRef.get();
            if(!snap.exists) await userDocRef.set({ email: user.email, balance: 300, isAdmin: false });
            document.getElementById('authContainer').style.display='none';
            document.getElementById('gameContainer').style.display='block';
            document.getElementById('userName').innerText = user.email.split('@')[0];
            updateUserBalanceUI();
            // проверка админа для вкладки
            let isAdmin = (await userDocRef.get()).data()?.isAdmin === true;
            let adminTab = document.querySelector('.admin-tab');
            if(adminTab) adminTab.style.display = isAdmin ? 'inline-block' : 'none';
            renderMyCats(); renderBreed(); renderMarket(); renderCare(); renderShop(); if(isAdmin) renderAdmin();
            initTabs();
        } else {
            currentUser=null;
            document.getElementById('authContainer').style.display='block';
            document.getElementById('gameContainer').style.display='none';
            renderAuth();
        }
    });
    // запуск автообновления баланса и фоновый процесс старения (опционально)
    setInterval(async ()=>{
        if(currentUser){
            updateUserBalanceUI();
            let cats = await db.collection('cats').where('ownerId','==',currentUser.uid).get();
            for(let doc of cats.docs){
                let data = doc.data();
                if(Math.random()<0.02) await doc.ref.update({ ageMonths: data.ageMonths+1, health: Math.max(0, data.health-0.5), happiness: Math.max(0,data.happiness-0.3) });
                if(data.ageMonths > 180 && data.health<10) await doc.ref.delete();
            }
        }
    }, 30000);
</script>
</body>
</html>
