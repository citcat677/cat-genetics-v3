<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Rush: битва за сокровища</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#1a1a2e; --panel:#16213e; --accent:#e94560; --gold:#f0c040; --text:#e0e0e0; --muted:#a0a0b8; --cell-size:70px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        #auth-screen, #main-screen { width:100%; max-width:900px; }
        .auth-card, .panel { background:var(--panel); border-radius:16px; padding:30px; box-shadow:0 8px 30px rgba(0,0,0,0.5); }
        .btn { padding:10px 20px; border-radius:25px; border:none; cursor:pointer; font-weight:600; margin:5px; transition:0.2s; }
        .btn-accent { background:var(--accent); color:#fff; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-outline { background:transparent; border:2px solid var(--accent); color:var(--accent); }
        .input { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #333; background:#1e1e38; color:#fff; }
        .grid-3cols { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .lobby-player { background:#0f3460; padding:12px; border-radius:10px; text-align:center; }
        .board { display:grid; gap:3px; justify-content:center; margin:20px 0; }
        .cell { width:var(--cell-size); height:var(--cell-size); background:#2a2a4a; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:1.8em; position:relative; }
        .cell.gold { background:#4a3f1e; } .cell.trap { background:#5e1e1e; } .cell.monster { background:#3e1e5e; }
        .player-token { position:absolute; width:30px; height:30px; border-radius:50%; border:2px solid white; font-size:1.2em; display:flex; align-items:center; justify-content:center; }
        .active-turn { animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        .hp-bar { height:8px; background:#444; border-radius:4px; margin:4px 0; }
        .hp-fill { height:100%; border-radius:4px; background:#4caf84; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-card">
            <h2>⚒️ Gold Rush: битва за сокровища</h2>
            <div id="auth-form">
                <input type="email" id="email" class="input" placeholder="Email">
                <input type="password" id="password" class="input" placeholder="Пароль">
                <div id="name-group" style="display:none;"><input type="text" id="username" class="input" placeholder="Ник"></div>
                <p id="auth-error" style="color:#ff6b6b;font-size:0.8em;"></p>
                <button class="btn btn-accent" id="auth-btn">Войти</button>
                <p style="margin-top:10px;"><span id="toggle-mode" style="color:var(--accent);cursor:pointer;">Регистрация</span></p>
            </div>
        </div>
    </div>

    <div id="main-screen" style="display:none;">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>🏆 Золотая лихорадка</h2>
                <div>
                    <span id="user-info" style="margin-right:20px;"></span>
                    <button class="btn btn-outline" id="logout-btn">Выйти</button>
                </div>
            </div>
            <div id="menu-view">
                <button class="btn btn-gold" id="create-game-btn">➕ Создать игру</button>
                <div style="margin:15px 0;">
                    <input type="text" id="join-code" class="input" placeholder="Код игры" style="width:auto; display:inline;">
                    <button class="btn btn-accent" id="join-game-btn">Присоединиться</button>
                </div>
                <div id="active-games-list" style="margin-top:20px;"></div>
            </div>
            <div id="lobby-view" style="display:none;">
                <h3>Лобби игры <span id="lobby-code"></span></h3>
                <div class="grid-3cols" id="lobby-players"></div>
                <button class="btn btn-accent" id="start-game-btn" style="display:none;">Начать игру</button>
                <p id="lobby-status"></p>
            </div>
            <div id="game-view" style="display:none;">
                <div style="display:flex; justify-content:space-between;">
                    <div id="game-status"></div>
                    <div id="player-stats"></div>
                </div>
                <div id="board-container"></div>
                <div id="controls" style="text-align:center; margin-top:15px;"></div>
            </div>
            <div id="admin-view" style="display:none;"></div>
        </div>
    </div>

    <script>
        (function() {
            // Firebase
            firebase.initializeApp({
                apiKey: "AIzaSyC0b58JT-x3te0LZmWQv5qA2mzG026ycK8",
                authDomain: "cat-games-v1.firebaseapp.com",
                projectId: "cat-games-v1",
                storageBucket: "cat-games-v1.firebasestorage.app",
                messagingSenderId: "357590792729",
                appId: "1:357590792729:web:7c40d851c8f09d5b388888"
            });
            const auth = firebase.auth();
            const db = firebase.firestore();

            // Состояние приложения
            let currentUser = null;
            let currentGameId = null;
            let gameListener = null;
            let isAdmin = false;
            const BOARD_SIZE = 6;

            // DOM элементы
            const authScreen = document.getElementById('auth-screen');
            const mainScreen = document.getElementById('main-screen');
            const menuView = document.getElementById('menu-view');
            const lobbyView = document.getElementById('lobby-view');
            const gameView = document.getElementById('game-view');
            const adminView = document.getElementById('admin-view');

            // Инициализация авторизации
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    isAdmin = (user.email === 'katya2013sara1981@gmail.com');
                    authScreen.style.display = 'none';
                    mainScreen.style.display = 'block';
                    document.getElementById('user-info').textContent = `👤 ${user.displayName || user.email}`;
                    document.getElementById('logout-btn').onclick = () => auth.signOut();
                    loadMainMenu();
                } else {
                    currentUser = null;
                    authScreen.style.display = 'flex';
                    mainScreen.style.display = 'none';
                    detachGameListener();
                }
            });

            // Переключение режима Вход/Регистрация
            let isLogin = true;
            document.getElementById('toggle-mode').onclick = () => {
                isLogin = !isLogin;
                document.getElementById('auth-btn').textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
                document.getElementById('toggle-mode').textContent = isLogin ? 'Регистрация' : 'Войти';
                document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
                document.getElementById('auth-error').textContent = '';
            };
            document.getElementById('auth-btn').onclick = () => {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const username = document.getElementById('username')?.value.trim();
                const errorEl = document.getElementById('auth-error');
                if (!email || !password) { errorEl.textContent = 'Введите email и пароль'; return; }
                if (password.length < 6) { errorEl.textContent = 'Пароль минимум 6 символов'; return; }
                const action = isLogin ? auth.signInWithEmailAndPassword(email, password) :
                    auth.createUserWithEmailAndPassword(email, password).then(r => {
                        return r.user.updateProfile({ displayName: username || email.split('@')[0] });
                    });
                action.catch(e => { errorEl.textContent = e.message; });
            };

            // Загрузка главного меню
            async function loadMainMenu() {
                menuView.style.display = 'block';
                lobbyView.style.display = 'none';
                gameView.style.display = 'none';
                adminView.style.display = isAdmin ? 'block' : 'none';
                if (isAdmin) renderAdminPanel();
                const activeGamesSnap = await db.collection('games').where('status', '==', 'waiting').limit(5).get();
                const gamesHtml = activeGamesSnap.docs.map(d => {
                    const g = d.data();
                    return `<div>Игра #${d.id.slice(-4)} (${g.players.length}/3) код: ${g.code}</div>`;
                }).join('');
                document.getElementById('active-games-list').innerHTML = gamesHtml || 'Нет активных игр';
            }

            // Создание игры
            document.getElementById('create-game-btn').onclick = async () => {
                const code = Math.random().toString(36).substring(2, 6).toUpperCase();
                const gameRef = await db.collection('games').add({
                    code: code,
                    players: [{
                        uid: currentUser.uid,
                        email: currentUser.email,
                        name: currentUser.displayName || 'Игрок',
                        hp: 100,
                        gold: 0,
                        items: [],
                        position: { x: 0, y: 0 }
                    }],
                    status: 'waiting',
                    currentTurn: 0,
                    board: null,
                    gameOver: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                currentGameId = gameRef.id;
                joinLobby(gameRef.id);
            };

            // Присоединение по коду
            document.getElementById('join-game-btn').onclick = async () => {
                const code = document.getElementById('join-code').value.trim().toUpperCase();
                if (!code) return alert('Введите код');
                const snap = await db.collection('games').where('code', '==', code).where('status', '==', 'waiting').get();
                if (snap.empty) return alert('Игра не найдена или уже началась');
                const gameDoc = snap.docs[0];
                const gameData = gameDoc.data();
                if (gameData.players.length >= 3) return alert('Игра уже заполнена');
                if (gameData.players.some(p => p.uid === currentUser.uid)) {
                    currentGameId = gameDoc.id;
                    joinLobby(gameDoc.id);
                    return;
                }
                await db.collection('games').doc(gameDoc.id).update({
                    players: firebase.firestore.FieldValue.arrayUnion({
                        uid: currentUser.uid,
                        email: currentUser.email,
                        name: currentUser.displayName || 'Игрок',
                        hp: 100,
                        gold: 0,
                        items: [],
                        position: { x: 0, y: 0 }
                    })
                });
                currentGameId = gameDoc.id;
                joinLobby(gameDoc.id);
            };

            // Лобби
            async function joinLobby(gameId) {
                menuView.style.display = 'none';
                lobbyView.style.display = 'block';
                gameView.style.display = 'none';
                document.getElementById('lobby-code').textContent = '';
                detachGameListener();
                gameListener = db.collection('games').doc(gameId).onSnapshot(doc => {
                    const game = doc.data();
                    if (!game) { alert('Игра удалена'); loadMainMenu(); return; }
                    document.getElementById('lobby-code').textContent = game.code;
                    renderLobbyPlayers(game.players);
                    const isCreator = game.players[0]?.uid === currentUser.uid;
                    document.getElementById('start-game-btn').style.display = (isCreator && game.players.length === 3) ? 'inline-block' : 'none';
                    if (game.status === 'active') startGameView(gameId);
                    else if (game.status === 'finished') { alert('Игра завершена'); loadMainMenu(); }
                });
                document.getElementById('start-game-btn').onclick = async () => {
                    await db.collection('games').doc(gameId).update({
                        status: 'active',
                        board: generateRandomBoard(),
                        currentTurn: 0
                    });
                };
            }

            function renderLobbyPlayers(players) {
                document.getElementById('lobby-players').innerHTML = players.map(p => `
                    <div class="lobby-player">${p.name} ${p.uid === currentUser.uid ? '(вы)' : ''}</div>
                `).join('');
            }

            // Генерация поля
            function generateRandomBoard() {
                const board = [];
                for (let y = 0; y < BOARD_SIZE; y++) {
                    const row = [];
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        const rand = Math.random();
                        if (rand < 0.2) row.push('gold');
                        else if (rand < 0.35) row.push('trap');
                        else if (rand < 0.45) row.push('monster');
                        else row.push('empty');
                    }
                    board.push(row);
                }
                // Стартовые позиции (углы)
                return board;
            }

            // Игровой процесс
            function startGameView(gameId) {
                lobbyView.style.display = 'none';
                gameView.style.display = 'block';
                detachGameListener();
                gameListener = db.collection('games').doc(gameId).onSnapshot(doc => {
                    const game = doc.data();
                    if (!game || game.status === 'finished') { loadMainMenu(); return; }
                    renderGame(game);
                });
            }

            function renderGame(game) {
                const me = game.players.find(p => p.uid === currentUser.uid);
                if (!me) return;
                document.getElementById('game-status').textContent = game.gameOver ? 'Игра окончена!' :
                    `Ход: ${game.players[game.currentTurn]?.name || '...'}`;
                document.getElementById('player-stats').innerHTML = game.players.map(p => `
                    <div style="margin:5px 0;">
                        <strong>${p.name}</strong> ❤️${p.hp} 💰${p.gold}
                        <div class="hp-bar"><div class="hp-fill" style="width:${p.hp}%;"></div></div>
                    </div>
                `).join('');

                const boardDiv = document.getElementById('board-container');
                boardDiv.innerHTML = '';
                const boardEl = document.createElement('div');
                boardEl.className = 'board';
                boardEl.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, var(--cell-size))`;
                for (let y = 0; y < BOARD_SIZE; y++) {
                    for (let x = 0; x < BOARD_SIZE; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell ' + (game.board[y][x] || 'empty');
                        cell.textContent = { gold: '🪙', trap: '💀', monster: '👾' }[game.board[y][x]] || '';
                        boardEl.appendChild(cell);
                    }
                }
                // Размещаем игроков
                game.players.forEach((p, idx) => {
                    const token = document.createElement('div');
                    token.className = 'player-token';
                    token.style.background = ['#e94560','#4a90d9','#f0c040'][idx];
                    token.textContent = idx + 1;
                    token.style.left = (p.position.x * 72 + 20) + 'px';
                    token.style.top = (p.position.y * 72 + 20) + 'px';
                    if (idx === game.currentTurn && !game.gameOver) token.classList.add('active-turn');
                    boardEl.appendChild(token);
                });
                boardDiv.appendChild(boardEl);

                // Управление
                const controls = document.getElementById('controls');
                controls.innerHTML = '';
                if (!game.gameOver && game.players[game.currentTurn]?.uid === currentUser.uid) {
                    controls.innerHTML = `
                        <button class="btn btn-accent" onclick="movePlayer('up')">⬆️</button>
                        <button class="btn btn-accent" onclick="movePlayer('down')">⬇️</button>
                        <button class="btn btn-accent" onclick="movePlayer('left')">⬅️</button>
                        <button class="btn btn-accent" onclick="movePlayer('right')">➡️</button>
                        <button class="btn btn-gold" onclick="useItem()">🧪 Зелье</button>
                        <button class="btn btn-gold" onclick="attackPlayer()">⚔️ Атака</button>
                    `;
                }
            }

            // Движение игрока
            window.movePlayer = async (dir) => {
                if (!currentGameId) return;
                const gameRef = db.collection('games').doc(currentGameId);
                try {
                    await db.runTransaction(async (transaction) => {
                        const doc = await transaction.get(gameRef);
                        if (!doc.exists) throw new Error('Игра не найдена');
                        const game = doc.data();
                        if (game.gameOver || game.players[game.currentTurn]?.uid !== currentUser.uid) throw new Error('Не ваш ход');
                        const player = game.players[game.currentTurn];
                        let newX = player.position.x;
                        let newY = player.position.y;
                        if (dir === 'up') newY--;
                        else if (dir === 'down') newY++;
                        else if (dir === 'left') newX--;
                        else if (dir === 'right') newX++;
                        if (newX < 0 || newX >= BOARD_SIZE || newY < 0 || newY >= BOARD_SIZE) throw new Error('За границу нельзя');
                        // Проверка на другого игрока
                        const otherPlayer = game.players.find(p => p.position.x === newX && p.position.y === newY);
                        if (otherPlayer) throw new Error('Клетка занята другим игроком');
                        // Применяем эффект клетки
                        const cellType = game.board[newY][newX];
                        if (cellType === 'gold') { player.gold += 10; game.board[newY][newX] = 'empty'; }
                        else if (cellType === 'trap') { player.hp -= 15; }
                        else if (cellType === 'monster') {
                            const weaponIdx = player.items.indexOf('weapon');
                            if (weaponIdx >= 0) { player.items.splice(weaponIdx, 1); player.gold += 15; }
                            else { player.hp -= 20; }
                        }
                        player.position = { x: newX, y: newY };
                        // Проверка смерти
                        if (player.hp <= 0) {
                            game.players = game.players.filter(p => p.uid !== player.uid);
                            if (game.players.length <= 1) game.gameOver = true;
                        }
                        // Победа по золоту
                        if (player.gold >= 100) game.gameOver = true;
                        // Переход хода
                        game.currentTurn = (game.currentTurn + 1) % game.players.length;
                        transaction.update(gameRef, game);
                    });
                } catch (e) { alert(e.message); }
            };

            window.useItem = async () => {
                const gameRef = db.collection('games').doc(currentGameId);
                await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(gameRef);
                    const game = doc.data();
                    const player = game.players[game.currentTurn];
                    if (player.uid !== currentUser.uid) throw new Error('Не ваш ход');
                    const potionIdx = player.items.indexOf('potion');
                    if (potionIdx < 0) throw new Error('Нет зелья');
                    player.items.splice(potionIdx, 1);
                    player.hp = Math.min(100, player.hp + 30);
                    game.currentTurn = (game.currentTurn + 1) % game.players.length;
                    transaction.update(gameRef, game);
                }).catch(e => alert(e.message));
            };

            window.attackPlayer = async () => {
                const gameRef = db.collection('games').doc(currentGameId);
                await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(gameRef);
                    const game = doc.data();
                    const player = game.players[game.currentTurn];
                    if (player.uid !== currentUser.uid) throw new Error('Не ваш ход');
                    // Поиск соседа
                    const target = game.players.find(p => p.uid !== player.uid &&
                        Math.abs(p.position.x - player.position.x) + Math.abs(p.position.y - player.position.y) === 1);
                    if (!target) throw new Error('Нет соседа для атаки');
                    target.hp -= 20;
                    if (target.hp <= 0) {
                        game.players = game.players.filter(p => p.uid !== target.uid);
                        if (game.players.length <= 1) game.gameOver = true;
                    }
                    game.currentTurn = (game.currentTurn + 1) % game.players.length;
                    transaction.update(gameRef, game);
                }).catch(e => alert(e.message));
            };

            function detachGameListener() {
                if (gameListener) { gameListener(); gameListener = null; }
            }

            // Админ-панель
            function renderAdminPanel() {
                adminView.innerHTML = `
                    <h3>⚙️ Админ-панель</h3>
                    <button class="btn btn-accent" id="admin-delete-games">Удалить все игры</button>
                    <div id="admin-result"></div>
                `;
                document.getElementById('admin-delete-games').onclick = async () => {
                    const snap = await db.collection('games').get();
                    const batch = db.batch();
                    snap.docs.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    document.getElementById('admin-result').textContent = 'Все игры удалены';
                };
            }

            // Обработка закрытия
            window.addEventListener('beforeunload', detachGameListener);
        })();
    </script>
</body>
</html>
